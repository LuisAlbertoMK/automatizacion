name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv pip install --system ruff pytest-cov bandit safety
          uv pip install --system -e ".[test,web]"

      - name: Lint with ruff
        run: ruff check src/ tests/ app.py health_check.py

      - name: Check compilation
        run: python -m compileall -q src/ app.py health_check.py

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports

      - name: Security scan (bandit)
        run: bandit -r src/ -x tests/ -ll --quiet

      - name: Security scan (safety)
        run: safety check --full-report --ignore=70612
        continue-on-error: true

      - name: Tests unitarios + coverage (threshold 80%)
        env:
          CAPTCHA_API_KEY: ${{ secrets.CAPTCHA_API_KEY || 'test' }}
          STORAGE_KEY: ${{ secrets.STORAGE_KEY || 'test_key_for_ci' }}
        run: |
          python -m pytest tests/ -v --tb=short -x --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=80 | head -80

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v5
        if: github.ref == 'refs/heads/master'
        continue-on-error: true
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Health check
        run: python health_check.py --quick 2>&1 || true

      - name: Check for secrets in staged files
        run: |
          echo "::notice::Pre-commit hook disponible localmente en .githooks/pre-commit"

  docker:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    needs: quality
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          REPO="${{ github.repository }}"
          REPO_LOWER=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT
          TAGS="ghcr.io/$REPO_LOWER:latest"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAGS="$TAGS,ghcr.io/$REPO_LOWER:${{ github.ref_name }}"
          fi
          TAGS="$TAGS,ghcr.io/$REPO_LOWER:${{ github.sha }}"
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
